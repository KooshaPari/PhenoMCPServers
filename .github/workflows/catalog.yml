name: catalog

on:
  pull_request:
    paths:
      - "catalog/**"
      - "schemas/**"
      - "plugins/**"
      - "servers/**"
      - "scripts/validate_*.py"
      - "docs/**"
      - "skills/**"
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validators
        run: pip install pyyaml jsonschema pytest
      - name: validate_catalog.py
        run: python scripts/validate_catalog.py
      - name: validate_fork_parents.py
        run: python scripts/validate_fork_parents.py
      - name: validate_stale_patterns.py
        run: python scripts/validate_stale_patterns.py
      - name: validate_bundle_wiring.py
        run: python scripts/validate_bundle_wiring.py
      - name: pytest bundle + hexakit
        run: pytest tests/test_bundle_wiring.py tests/test_hexakit_template.py -q
