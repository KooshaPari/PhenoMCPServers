name: CI
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '**.md'

# Thin caller that adopts the phenoShared reusable Rust CI workflow.
# Pinned to HEAD SHA of KooshaPari/phenoShared@main until PR #85 merges and
# exposes `.github/workflows/reusable/ci.yml`. Once merged, re-pin to a tag
# (e.g. @v1) per the phenoShared release policy.
permissions:
  contents: read

jobs:
  rust-ci:
    uses: KooshaPari/phenoShared/.github/workflows/ci.yml@4b820a6d1eca7884e692e4ec4edf2b59732809cd
    with:
      language: rust
