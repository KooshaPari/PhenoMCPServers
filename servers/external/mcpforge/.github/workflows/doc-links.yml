name: Doc Links
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '**.md'
  pull_request:
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '**.md'
permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - run: echo "Doc link check (phenotype-tooling integration)"
