# PhenoMCPServers catalog — single source of truth
# Version bumps when any entry changes shape or wiring.
registry_version: "1.1.0"

# Language tiers & roles: docs/LANGUAGE-TIERS-AND-ROLES.md
# Tier 0: Rust/Zig/Mojo core | Tier 1: Go edges (justified) | Tier 2: Py3.14/uv, Bun, TS7, C#, Java
# Anti-pattern: language umbrella SDKs (phenotype-rust-sdk, phenotype-go-sdk) — use domain roles below.
# Boundary audit (issue #7): phenotype-go-sdk is RETIRED. Go survives only at tier-1 edges.

language_policy:
  tier_0: [rust, zig, mojo]
  tier_1: [go]
  tier_2: [python, typescript, csharp, java]
  tier_3: [shell, pwsh]
  python_toolchain: "3.14+; uv"
  typescript_toolchain: "TS 7 preview; Bun where applicable"
  parallel_workstreams:
    - phenofastmcp-py
    - phenofastmcp-go
    - phenofastmcp-rust
    - phenomcp-servers
    - substrate-runtime

# Retired anti-patterns — language umbrella SDKs (issue #7).
# Do not re-introduce these. They were language buckets, not domain roles,
# and they duplicated the per-domain forks listed under `framework:` below.
retired_anti_patterns:
  - id: phenotype-go-sdk
    status: retired
    retired_on: "2026-06-17"
    ticket: "#7"
    rationale: >
      Generic Go catch-all that consolidated PlatformKit, DevHex, and McpKit.
      Conflicts with the tier model: Go is tier-1 edges only, not a second
      core and not a place for cross-domain library dumping.
    replacement:
      - KooshaPari/PhenoFastMCP-go   # tier-1 MCP framework fork
      - KooshaPari/MCPForge          # tier-1 LSP / HTTP MCP edge
      - KooshaPari/phenotype-ops-mcp # tier-1 ops / unikernel edge
    successor_role: edge-gateway
    successor_tier: 1
  - id: phenotype-rust-sdk
    status: retired
    retired_on: "2026-06-17"
    ticket: "#7"
    rationale: >
      Generic Rust catch-all — same anti-pattern as phenotype-go-sdk.
      Rust belongs to tier-0 domain forks, not a language bucket.
    replacement:
      - KooshaPari/PhenoFastMCP-rust # tier-0 MCP framework fork (rmcp)
      - KooshaPari/substrate         # tier-0 fleet runtime (driver-* crates)
      - KooshaPari/phenoUtils       # tier-0 hex ports, crypto, fs
    successor_role: mcp-framework
    successor_tier: 0

# Surviving tier-1 Go inventory (written justifications — Go placement rule).
# These are the ONLY Go repos allowed; everything else in Go must justify here.
go_tier1_inventory:
  - id: phenofastmcp-go
    repo: https://github.com/KooshaPari/PhenoFastMCP-go
    role: mcp-framework
    tier: 1
    justification: "Fork of mark3labs/mcp-go; upstream is Go-native. Provides HTTP/SSE MCP edge servers."
  - id: mcpforge
    repo: https://github.com/KooshaPari/MCPForge
    role: edge-gateway
    tier: 1
    justification: "LSP / HTTP MCP edge gateway in front of tier-0 substrate; not bulk app logic."
  - id: ops-mcp
    repo: https://github.com/KooshaPari/phenotype-ops-mcp
    role: edge-gateway
    tier: 1
    justification: "NanoVM / unikernel ops boundary; microservice edge over substrate runtime."
  - id: substrate-go-client
    repo: null
    role: edge-gateway
    tier: 1
    justification: "Thin Go client for substrate HTTP API. Reuses phenofastmcp-go transport; no domain logic."

framework:
  rust:
    repo: https://github.com/KooshaPari/PhenoFastMCP-rust
    upstream: https://github.com/modelcontextprotocol/rust-sdk
    fork_parent: modelcontextprotocol/rust-sdk
    tier: 0
    role: mcp-framework
    parallel_lane: phenofastmcp-rust
    note: tier-0 rmcp; FastRMCP ergonomics via superset only
  go:
    repo: https://github.com/KooshaPari/PhenoFastMCP-go
    upstream: https://github.com/mark3labs/mcp-go
    fork_parent: mark3labs/mcp-go
    tier: 1
    role: mcp-framework
    parallel_lane: phenofastmcp-go
    justification: HTTP/SSE MCP edge servers; upstream is Go-native (MCPForge)
  python:
    repo: https://github.com/KooshaPari/PhenoFastMCP
    upstream: https://github.com/PrefectHQ/fastmcp
    fork_parent: PrefectHQ/fastmcp
    baseline_tag: v3.4.2
    tier: 2
    role: mcp-framework
    parallel_lane: phenofastmcp-py
    toolchain: "py3.14; uv"
    note: fastmcp binding tier — not protocol core long-term

servers:
  - id: substrate
    title: Substrate fleet MCP
    description: dispatch, plan, route over HTTP plus team mailbox tools
    package: servers/substrate
    language: python
    framework: fastmcp
    transport: stdio
    entry:
      module: substrate_server
      callable: mcp.run
    env:
      - SUBSTRATE_HTTP_URL
      - SUBSTRATE_HTTP_AUTH_TOKEN
      - SUBSTRATE_TEAM_ID
      - SUBSTRATE_AGENT_NAME
      - SUBSTRATE_DB
    status: active

  - id: substrate-dispatch
    title: Substrate OmniRoute tier dispatch
    description: Per-tier dispatch tools delegating to OmniRoute
    package: servers/substrate
    language: python
    framework: fastmcp
    transport: stdio
    entry:
      module: dispatch_server
      callable: main
    env:
      - OMNIROUTE_URL
      - LOG_LEVEL
    status: active

  - id: mcpforge
    title: MCPForge LSP server
    description: Semantic code tools via language servers
    package: external
    repo: https://github.com/KooshaPari/MCPForge
    language: go
    transport: stdio
    status: pointer

  - id: ops-mcp
    title: NanoVM ops MCP
    description: Unikernel instance and image lifecycle
    package: external
    repo: https://github.com/KooshaPari/phenotype-ops-mcp
    language: go
    transport: stdio
    status: pointer

skills:
  - id: substrate-dispatch-skill
    title: Substrate dispatch skill
    description: Invoke substrate_dispatch and substrate_plan from agents
    path: skills/substrate-dispatch
    requires_servers:
      - substrate
    status: template

plugins:
  - id: phenotype-mcp-bundle
    title: Phenotype default MCP bundle
    description: Wires substrate + org servers for Cursor/Claude clients
    path: plugins/phenotype-bundle
    servers:
      - substrate
      - substrate-dispatch
    status: template

agents:
  - id: fleet-lead
    title: Fleet lead agent
    description: Lead agent with team mailbox and dispatch tools
    path: agents/fleet-lead
    skills:
      - substrate-dispatch-skill
    servers:
      - substrate
    status: template
